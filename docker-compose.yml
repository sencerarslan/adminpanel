services:
  postgres:
    image: postgres:16-alpine
    container_name: adminpanel_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-adminpanel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-adminpanel_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adminpanel} -d ${POSTGRES_DB:-adminpanel_dev}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - adminpanel_network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adminpanel_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-adminpanel}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-adminpanel_dev}?schema=public
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key-for-development}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - adminpanel_network

volumes:
  postgres_data:
    name: adminpanel_postgres_data

networks:
  adminpanel_network:
    name: adminpanel_network
    driver: bridge
